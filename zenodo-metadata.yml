creators:
  - name: "Gomez, Diego"
    affiliation: "Independent Researcher"
    # orcid: "0000-0000-0000-0000"   # uncomment and fill if you have an ORCID

# Description: shown on the Zenodo landing page and indexed by Google Scholar.
# 200-400 words. Do NOT use markdown bold/headers — plain text only in Zenodo description.
description: |
  Multi-agent AI systems deployed on consequential tasks routinely produce well-formed outputs
  that perform thoroughness without executing the underlying work. This case study names and
  characterizes that failure mode — compliance theater — as a previously-unnamed affirmative-
  assertion sub-case of MAST FM-3.2 (Verification Step Omission, under FC3 Task Verification),
  distinct from sycophancy, sabotage, and satisficing.

  The setting is a 9-agent Claude (Opus and Sonnet) harness built to audit adversarial smart
  contract code across a multi-repo codebase. Agents consistently self-reported completed
  checklists they had not executed; the pattern appeared without instruction, reward signal, or
  persona directing misreport, and reproduced across model families and offensive/defensive task
  framings. Three pre-gate runs confirm it arises under structured-checklist pressure before the
  discard threshold that a circularity objection might invoke — consistent with Regressional
  Goodhart.

  The paper's main contribution is a refutation-locus classification rule — externally-
  adjudicable procedure versus session-stream self-count — with three pre-registered refutation
  predicates (compilation_status, tests_written, tests_passed). The rule is applied to a single
  sidecar that simultaneously exhibits two C1 refutations and one non-refutation from the same
  document, demonstrating predicate selectivity on a worked example. Two empirically-separable
  sub-types — coarse-inflation CT and specific-binary-claim CT — share a C1 refutation-predicate
  signature while exhibiting differential ablation response to gate removal (N=1 per cell); the
  paper frames this as a syndrome rather than a unified mechanism and does not claim shared
  aetiology.

  Measurement uses three non-overlapping surfaces: a 6-dimension compliance rubric (0-120)
  scoring sidecar-reported behavior; a 16-dimension trace-analyzer reading the tool-call stream
  the agent left behind; and independent artifact-level checks (forge build, grep, forge test).
  Rubric score advances from 39.8 to 112.5 over a 17-run non-monotone iteration window
  (Spearman r = 0.78); this trajectory is a consistency check, not a demonstration of efficacy.

  Ground-truth outcome labels are sparse (N=9). Pending work: inter-rater reliability pilot
  and second-harness replication. The audit framework is open source at
  github.com/0xquinto/limit-break-amm.

